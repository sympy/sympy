name: Docs Preview
on: [status]

permissions: {}

jobs:
  circleci_artifacts_redirector_job:
    # This workflow runs on a privileged status event. Keep it narrowly scoped:
    # do not add checkout steps, shell steps, or broader token permissions here.
    if: >
      github.event.context == 'ci/circleci: Build Docs Preview' &&
      github.event.target_url != null &&
      (
        startsWith(github.event.target_url, 'https://circleci.com/') ||
        startsWith(github.event.target_url, 'https://app.circleci.com/')
      )
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    name: Run CircleCI artifacts redirector
    steps:
      - name: GitHub Action step
        id: step1
        uses: scientific-python/circleci-artifacts-redirector-action@5d358ff96e96429a5c64a969bb4a574555439f4f # v1.3.1
        with:
          repo-token: ${{ github.token }}
          artifact-path: 0/doc/_build/html/index.html
          circleci-jobs: Build Docs Preview
          job-title: Click here to see a preview of the documentation.
          api-token: ${{ secrets.CIRCLECI_TOKEN }}
      # This keeps failing even though the step above suceeds:
      #- name: Check the URL
      #  if: github.event.status != 'pending'
      #  run: |
      #    curl --fail ${{ steps.step1.outputs.url }} | grep $GITHUB_SHA
